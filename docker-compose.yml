version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: wealthops-postgres

    environment:
      POSTGRES_DB: wealthops
      POSTGRES_USER: wealthuser
      POSTGRES_PASSWORD: wealth123

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  wealthops:
    build: .

    container_name: wealthops-app

    ports:
      - "5000:5000"

    depends_on:
      - postgres

volumes:
  postgres-data: