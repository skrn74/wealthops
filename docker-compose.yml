version: '3.9'

services:

  postgres:

    image: postgres:17

    container_name: wealthops-postgres

    restart: always

    environment:

      POSTGRES_DB: wealthops

      POSTGRES_USER: wealthuser

      POSTGRES_PASSWORD: wealth123

    ports:

      - "5432:5432"

    volumes:

      - postgres-data:/var/lib/postgresql/data

volumes:

  postgres-data: